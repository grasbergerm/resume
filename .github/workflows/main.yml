name: Build LaTeX document
on: [push]

# Least-privilege default; the publish job uses a dedicated PAT for the external repo.
permissions:
  contents: read

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # 4.1.0
        with:
          root_file: MatthewGrasberger.tex
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MatthewGrasberger.pdf
          path: MatthewGrasberger.pdf

  upload_files:
    runs-on: ubuntu-latest
    # Manual approval gate: this job pauses until a required reviewer of the
    # 'grasbergerm.com' environment approves it in the Actions UI. Configure the
    # reviewer under repo Settings -> Environments -> grasbergerm.com.
    # At approval time the compiled PDF is already available as the build_latex
    # artifact, so it can be inspected before approving the push.
    environment:
      name: grasbergerm.com
      url: https://grasbergerm.com/MatthewGrasberger.pdf
    needs: build_latex
    name: Uploads resume PDF to grasbergerm.com
    # Only publish to the live site from main, not from feature branches.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout grasbergerm.com
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: grasbergerm/grasbergerm.com
          ref: 'main'
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: MatthewGrasberger.pdf
      - name: Commit and push updated PDF
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git add MatthewGrasberger.pdf
          # Only commit when the PDF actually changed, otherwise the job fails on an empty commit.
          if git diff --staged --quiet; then
            echo "No changes to MatthewGrasberger.pdf; nothing to publish."
          else
            git commit -m "Update MatthewGrasberger.pdf"
            git push origin main
          fi
