name: Build LaTeX document
on: [push]

# Least-privilege default; the publish job uses a dedicated PAT for the external repo.
permissions:
  contents: read

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # 3.3.0
        with:
          root_file: MatthewGrasberger.tex
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MatthewGrasberger.pdf
          path: MatthewGrasberger.pdf
      - name: Send mail to check PDF compilation before upload to grasbergerm.com
        uses: dawidd6/action-send-mail@2cea9617b09d79a095af21254fbcb7ae95903dde # v3.12.0
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Github Actions job result
          to: grasbergerm@gmail.com
          from: Github Actions # <user@example.com>
          body: Resume compilation result from ${{ github.repository }}. See attachment.
          attachments: MatthewGrasberger.pdf

  upload_files:
    runs-on: ubuntu-latest
    environment: 'grasbergerm.com'
    needs: build_latex
    name: Uploads resume PDF to grasbergerm.com
    # Only publish to the live site from main, not from feature branches.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout grasbergerm.github.io
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: grasbergerm/grasbergerm.com
          ref: 'main'
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: MatthewGrasberger.pdf
      - name: Commit and push updated PDF
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git add MatthewGrasberger.pdf
          # Only commit when the PDF actually changed, otherwise the job fails on an empty commit.
          if git diff --staged --quiet; then
            echo "No changes to MatthewGrasberger.pdf; nothing to publish."
          else
            git commit -m "Update MatthewGrasberger.pdf"
            git push origin main
          fi
